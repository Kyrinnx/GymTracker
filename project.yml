name: GymTracker
options:
  bundleIdPrefix: com.gymtracker.app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  GymTracker:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Mascots
        buildPhase: resources
    entitlements:
      path: Resources/GymTracker.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gymtracker.app
        INFOPLIST_FILE: Resources/Info.plist
schemes:
  GymTracker:
    build:
      targets:
        GymTracker: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
