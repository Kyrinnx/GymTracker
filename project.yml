name: GymTracker
options:
  bundleIdPrefix: com.quentin.gymtracker
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  GymTracker:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    entitlements:
      path: Resources/GymTracker.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quentin.gymtracker
        INFOPLIST_FILE: Resources/Info.plist
schemes:
  GymTracker:
    build:
      targets:
        GymTracker: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
